<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGO TV — Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#FF1A1A;--black:#000;--white:#f5f5f0;--gray:#888;--mono:'Space Mono',monospace;--display:'Bebas Neue',sans-serif;}
html,body{height:100%;}
body{background:var(--black);color:var(--white);font-family:var(--mono);cursor:crosshair;overflow:hidden;}
::selection{background:var(--red);color:var(--black);}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:99;opacity:0.3;mix-blend-mode:overlay;}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.25rem 2.5rem;border-bottom:1px solid rgba(255,26,26,0.12);background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);}
.nav-logo{font-family:var(--display);font-size:1.6rem;letter-spacing:0.1em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--red);}
.nav-back{font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:1px;transition:color 0.2s;}
.nav-back:hover{color:var(--red);}

.page{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;}

.bg-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--display);font-size:clamp(8rem,22vw,18rem);color:rgba(255,26,26,0.04);white-space:nowrap;pointer-events:none;line-height:1;user-select:none;letter-spacing:0.05em;}

.eyebrow{font-size:0.52rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--red);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:0.65rem;position:relative;z-index:1;}
.eyebrow::before{content:'';width:20px;height:1px;background:var(--red);}
.eyebrow::after{content:'';width:20px;height:1px;background:var(--red);}

.title{font-family:var(--display);font-size:clamp(4rem,10vw,8rem);line-height:0.9;letter-spacing:0.03em;color:var(--white);margin-bottom:2rem;position:relative;z-index:1;}
.title span{color:var(--red);}

.sub{font-size:0.65rem;line-height:2.1;color:rgba(255,255,255,0.4);max-width:400px;letter-spacing:0.04em;position:relative;z-index:1;margin-bottom:2.5rem;}

.divider-line{width:40px;height:1px;background:rgba(255,26,26,0.3);margin:0 auto 2.5rem;position:relative;z-index:1;}

.notify-text{font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);position:relative;z-index:1;margin-bottom:1.25rem;}

.contact-link{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);text-decoration:none;border-bottom:1px solid rgba(255,26,26,0.3);padding-bottom:2px;transition:border-color 0.2s;position:relative;z-index:1;}
.contact-link:hover{border-color:var(--red);}

.btn-back{display:inline-block;margin-top:2.5rem;font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;padding:0.8rem 1.75rem;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);text-decoration:none;transition:border-color 0.2s,color 0.2s;position:relative;z-index:1;}
.btn-back:hover{border-color:var(--red);color:var(--red);}

/* Animated shutter */
.shutter{position:relative;z-index:1;margin-bottom:2rem;}
.shutter-icon{width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(255,26,26,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto;animation:shutter-pulse 3s ease-in-out infinite;}
.shutter-inner{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,26,26,0.4);}
@keyframes shutter-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,26,26,0.15);}50%{box-shadow:0 0 0 10px rgba(255,26,26,0);}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="egotv.html">EGO <span>TV</span></a>
  <a href="egotv.html" class="nav-back">← Agency</a>
</nav>

<div class="page">
  <div class="bg-text">PHOTO</div>

  <div class="shutter">
    <div class="shutter-icon">
      <div class="shutter-inner"></div>
    </div>
  </div>

  <div class="eyebrow">Photography Portfolio</div>

  <h1 class="title">COMING<br><span>SOON.</span></h1>

  <div class="divider-line"></div>

  <p class="sub">The photography portfolio is being put together. Check back shortly — or get in touch if you need a photographer now.</p>

  <div class="notify-text">In the meantime —</div>
  <a href="mailto:info@egotv777.com" class="contact-link">info@egotv777.com</a>

  <a href="egotv.html" class="btn-back">← Back to Agency</a>
</div>

</body>
</html>
<!-- RESPONSIVE injected -->
<style>
@media(max-width:768px){
  .nav{padding:0.85rem 1.25rem;}
  .title{font-size:clamp(3rem,14vw,5rem);}
  .bg-text{font-size:clamp(5rem,18vw,10rem);}
  .sub{font-size:0.6rem;}
  .btn-back{padding:12px 20px;}
}
</style>
